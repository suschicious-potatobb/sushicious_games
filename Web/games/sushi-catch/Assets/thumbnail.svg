<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="400" height="400" fill="#0f0f0f" />
    
    <!-- Plate -->
    <rect x="150" y="320" width="100" height="15" rx="5" fill="#f0f0f0" />
    
    <!-- Falling Sushi -->
    <text x="180" y="100" font-size="60" text-anchor="middle">🍣</text>
    <text x="240" y="180" font-size="60" text-anchor="middle">🦐</text>
    <text x="140" y="240" font-size="60" text-anchor="middle">🍣</text>
    
    <!-- Motion lines -->
    <line x1="180" y1="40" x2="180" y2="70" stroke="#ff3e3e" stroke-width="4" stroke-linecap="round" />
    <line x1="240" y1="120" x2="240" y2="150" stroke="#ff3e3e" stroke-width="4" stroke-linecap="round" />
    <line x1="140" y1="180" x2="140" y2="210" stroke="#ff3e3e" stroke-width="4" stroke-linecap="round" />
</svg>
