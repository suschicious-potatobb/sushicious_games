<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="400" height="400" fill="#0f0f0f" />
    
    <!-- Grid Pattern (Japanese style) -->
    <rect x="50" y="50" width="140" height="140" rx="8" fill="#e63946" />
    <rect x="210" y="50" width="140" height="140" rx="8" fill="#fff" />
    <rect x="50" y="210" width="140" height="140" rx="8" fill="#fff" />
    <rect x="210" y="210" width="140" height="140" rx="8" fill="#e63946" />
    
    <!-- Emojis -->
    <text x="280" y="140" font-size="80" text-anchor="middle">🍣</text>
    <text x="120" y="300" font-size="80" text-anchor="middle">🍣</text>
    
    <!-- Accent line -->
    <line x1="50" x2="350" y1="200" y2="200" stroke="#d4af37" stroke-width="2" opacity="0.3" />
    <line x1="200" x2="200" y1="50" y2="350" stroke="#d4af37" stroke-width="2" opacity="0.3" />
</svg>
