<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: #0f0f0f;
            font-family: 'Inter', sans-serif;
        }
        #game-container {
            flex: 1; /* Take up all remaining space */
            width: 100%;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .ad-space {
            flex-shrink: 0;
            height: 90px;
            background: #1a1a1a;
            text-align: center;
            line-height: 90px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 1000; /* Ensure it stays on top if anything overflows */
        }
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s ease, transform 0.3s ease, background 0.3s ease;
            opacity: 1;
        }
        .back-button:hover {
            background: rgba(255, 62, 62, 0.9);
            border-color: #ff3e3e;
            transform: translateX(-5px);
        }
        iframe {
            flex: 1; /* Make iframe fill the game-container */
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-button" id="back-button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span id="back-text">Back</span>
        </a>
        <iframe id="game-iframe"></iframe>
    </div>
    <div class="ad-space" id="ad-text">
        Advertisement
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('game-iframe');
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('game');
            const adText = document.getElementById('ad-text');
            const backText = document.getElementById('back-text');

            // Sync language
            const currentLang = localStorage.getItem('sushicious_lang') || 'en';
            adText.textContent = currentLang === 'ja' ? 'スポンサー広告' : 'Advertisement';
            backText.textContent = currentLang === 'ja' ? 'ゲーム一覧に戻る' : 'Back to Games';

            if (gameId) {
                iframe.src = `games/${gameId}/index.html`;
            } else {
                window.location.href = 'index.html';
            }

            // Handle visibility messages from games
            window.addEventListener('message', (event) => {
                const backButton = document.getElementById('back-button');
                if (event.data === 'gameState:playing') {
                    backButton.style.opacity = '0';
                    backButton.style.pointerEvents = 'none';
                } else if (event.data === 'gameState:not_playing') {
                    backButton.style.opacity = '1';
                    backButton.style.pointerEvents = 'auto';
                }
            });
        });
    </script>
</body>
</html>
