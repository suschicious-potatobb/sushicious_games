<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .ad-space {
            height: 90px;
            background: #eee;
            text-align: center;
            line-height: 90px;
            color: #666;
            font-size: 14px;
        }
        #game-container {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 90px); /* Subtract ad-space height */
            position: relative;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <iframe id="game-iframe"></iframe>
    </div>
    <div class="ad-space">
        <!-- AdSense広告スペース -->
        <p>広告</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('game-iframe');
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('game');

            if (gameId) {
                iframe.src = `games/${gameId}/index.html`;
            } else {
                // ゲームIDがない場合はトップページにリダイレクト
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
