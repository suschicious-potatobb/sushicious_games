<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: #0f0f0f;
            font-family: 'Inter', sans-serif;
        }
        .ad-space {
            height: 90px;
            background: #1a1a1a;
            text-align: center;
            line-height: 90px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #game-container {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 90px);
            position: relative;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <iframe id="game-iframe"></iframe>
    </div>
    <div class="ad-space" id="ad-text">
        Advertisement
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('game-iframe');
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('game');
            const adText = document.getElementById('ad-text');

            // Sync language for ad text
            const currentLang = localStorage.getItem('sushicious_lang') || 'en';
            adText.textContent = currentLang === 'ja' ? 'スポンサー広告' : 'Advertisement';

            if (gameId) {
                iframe.src = `games/${gameId}/index.html`;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
