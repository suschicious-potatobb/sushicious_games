name: Update Daily Trends

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 00:00 UTC (日本時間 09:00) に実行
  workflow_dispatch:      # 手動実行も可能にする

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # リポジトリへの書き込み権限を付与

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Pull
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull origin main --rebase

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai tweepy

    - name: Run update script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
        X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
        X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      run: python update_trends.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull origin main --rebase
        git add trends.html index.html
        git commit -m "docs: update daily trends [skip ci]" || echo "No changes to commit"
        git push
